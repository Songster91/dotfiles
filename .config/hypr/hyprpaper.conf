# ============================================================
# hyprpaper.conf — Static fallback wallpaper
# The change-wallpaper.sh script overrides this dynamically
# ============================================================

# Preload your wallpaper (required before setting)
preload = /home/songster/Pictures/Wallpapers/wallpaperflare.com_wallpaper.jpg

# Set it on all monitors (blank = all)
wallpaper = , /home/songster/Pictures/Wallpapers/wallpaperflare.com_wallpaper.jpg

# Splash screen removed
splash = false
