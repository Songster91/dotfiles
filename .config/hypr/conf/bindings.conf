# ============================================================
# bindings.conf — Songster's Keybindings
# Vim-first philosophy: hjkl navigation everywhere
# ============================================================

$mainMod     = SUPER
$terminal    = kitty
$fileManager = thunar
$menu        = rofi -show drun
$browser     = brave


# ── Core Apps ────────────────────────────────────────────────
bind = $mainMod,       RETURN, exec, $terminal
bind = $mainMod,       Q,      killactive
bind = $mainMod,       F,      exec, $fileManager
bind = $mainMod,       SPACE,  exec, $menu
bind = $mainMod ALT,   SPACE,  exec, rofi -show run
bind = $mainMod,       W,      exec, ~/.config/hypr/scripts/change-wallpaper.sh
bind = $mainMod,       B,      exec, $browser
bind = $mainMod SHIFT, B,      exec, $browser --private-window


# ── Editors ──────────────────────────────────────────────────
bind = $mainMod,       N,      exec, kitty -e nvim
bind = $mainMod,       V,      exec, kitty --directory "/mnt/songster/Local Disk E/Learning/Coding" -e nvim
bind = $mainMod,       O,      exec, kitty --directory "/mnt/songster/Local Disk E/Learning/Notes/Obsidian/Second Brain" -e nvim


# ── Screenshots ──────────────────────────────────────────────
bind =            , Print,       exec, hyprshot -m region --clipboard-only
bind = CTRL       , Print,       exec, hyprshot -m region
bind = CTRL SHIFT , Print,       exec, hyprshot -m region -o - | swappy -f -
bind =        ALT , Print,       exec, hyprpicker -a


# ── Clipboard ────────────────────────────────────────────────
bind = $mainMod, semicolon, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

bind = $mainMod , T, exec, ~/.config/hypr/scripts/toggle-touchpad.sh

bind = $mainMod, S, exec, ~/.config/hypr/scripts/theme-switch.sh

# okular-color-toggle
bind = $mainMod, F8, exec, ~/.local/bin/okular-toggle.sh



# ── Notification ────────────────────────────────────────────────
bind = $mainMod, apostrophe, exec, swaync-client -t



# ── Waybar Pomodoro ──────────────────────────────────────────
bind = $mainMod SHIFT, F, exec, ~/.config/waybar/scripts/open-tracker.sh



# waybar auto hide
bind = SUPER, X, exec, ~/.config/waybar/scripts/waybar-autohide.sh --toggle


# ── Web Dev Localhost ────────────────────────────────────────
bind = $mainMod ALT, L, exec, $browser http://localhost:3000
bind = $mainMod ALT, P, exec, $browser http://localhost:5173

# ── Webapps (Brave PWA-style) ────────────────────────────────
bind = $mainMod SHIFT, M, exec, $browser --app=https://monkeytype.com/
bind = $mainMod,       A, exec, $browser --app=https://chatgpt.com/
bind = $mainMod SHIFT, C, exec, $browser --app=https://claude.ai/new
bind = $mainMod,       C, exec, $browser --app=https://calendar.google.com/
bind = $mainMod SHIFT, Y, exec, $browser --app=https://www.youtube.com/
bind = $mainMod SHIFT, W, exec, $browser --app=https://web.whatsapp.com/
bind = $mainMod SHIFT, O, exec, $browser --app=https://www.theodinproject.com/
bind = $mainMod ALT,   O, exec, $browser --app=https://www.freecodecamp.org/learn
bind = $mainMod SHIFT, K, exec, $browser --app=https://www.keybr.com/
bind = $mainMod SHIFT, G, exec, $browser --app=https://github.com/
bind = $mainMod SHIFT, P, exec, $browser --app=https://www.facebook.com/messages/

bind = $mainMod SHIFT, T, exec, $browser --app=https://web.telegram.org/k/

bind = $mainMod SHIFT, I, exec, $browser --app=https://muslimbangla.com/


bind = $mainMod SHIFT, H, exec, $browser --app=https://hoichoi.tv/bd


bind = $mainMod, H, exec, $browser --app=https://moviebox.ph/


bind = $mainMod, D, exec, $browser --app=https://discord.com/channels/@me




# ── Window Focus (vim hjkl) ──────────────────────────────────
# bind = $mainMod, h, movefocus, l
# bind = $mainMod, l, movefocus, r
# bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# ── Move Windows ─────────────────────────────────────────────
bind = $mainMod ALT, h, movewindow, l
bind = $mainMod ALT, l, movewindow, r
bind = $mainMod ALT, k, movewindow, u
bind = $mainMod ALT, j, movewindow, d

# ── Resize Windows ───────────────────────────────────────────
binde = $mainMod CTRL, h, resizeactive, -40 0
binde = $mainMod CTRL, l, resizeactive,  40 0
binde = $mainMod CTRL, k, resizeactive, 0 -40
binde = $mainMod CTRL, j, resizeactive, 0  40

# ── Layout ───────────────────────────────────────────────────
bind = $mainMod SHIFT, J, layoutmsg, togglesplit
bind = $mainMod,       M, fullscreen, 0

# ── Workspaces ───────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod ALT, 1, movetoworkspacesilent, 1
bind = $mainMod ALT, 2, movetoworkspacesilent, 2
bind = $mainMod ALT, 3, movetoworkspacesilent, 3
bind = $mainMod ALT, 4, movetoworkspacesilent, 4
bind = $mainMod ALT, 5, movetoworkspacesilent, 5

bind = $mainMod,       Tab,          workspace, e+1
bind = $mainMod SHIFT, Tab,          workspace, e-1
bind = $mainMod,       bracketright, workspace, e+1
bind = $mainMod,       bracketleft,  workspace, e-1
bind = $mainMod,       grave,        workspace, previous

# ── Mouse ────────────────────────────────────────────────────
bind  = $mainMod, mouse_down, workspace, e+1
bind  = $mainMod, mouse_up,   workspace, e-1
bindm = $mainMod, mouse:272,  movewindow
bindm = $mainMod, mouse:273,  resizewindow

# ── Media / Volume / Brightness ──────────────────────────────
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPause,        exec, playerctl play-pause
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioPrev,         exec, playerctl previous
