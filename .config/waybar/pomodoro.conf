# ──────────────────────────────────────────
#   Pomodoro Timer Config
#   Middle-click the timer in waybar to open this file.
#   Edit the values, save, and changes apply on next timer start.
# ──────────────────────────────────────────

# Work session duration (minutes)
WORK_MINUTES=90

# Short break duration (minutes)
BREAK_MINUTES=20

# Long break duration (minutes)
LONG_BREAK_MINUTES=45

# How many work sessions before a long break
SESSIONS_UNTIL_LONG=3

# Play a sound when a session ends (true/false)
SOUND_ENABLED=true
