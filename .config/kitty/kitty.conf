# ============================================================
# kitty.conf — Songster's terminal
# Dracula theme · JetBrainsMono Nerd Font · Intel HD 620
# ============================================================

# ── Font ─────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# ── Cursor ───────────────────────────────────────────────────
cursor_shape           block
cursor_blink_interval  0

# ── Scrollback ───────────────────────────────────────────────
scrollback_lines 5000

# ── Window ───────────────────────────────────────────────────
window_padding_width    8
hide_window_decorations yes
confirm_os_window_close 0

# ── Tab bar ──────────────────────────────────────────────────
tab_bar_style hidden

# ── Performance (Intel iGPU) ─────────────────────────────────
sync_to_monitor yes
repaint_delay   8
input_delay     1

# ── Dracula colors ───────────────────────────────────────────
foreground            #F8F8F2
background            #282A36
selection_foreground  #282A36
selection_background  #BD93F9

# Black
color0  #21222C
color8  #6272A4
# Red
color1  #FF5555
color9  #FF6E6E
# Green
color2  #50FA7B
color10 #69FF94
# Yellow
color3  #F1FA8C
color11 #FFFFA5
# Blue
color4  #BD93F9
color12 #D6ACFF
# Magenta
color5  #FF79C6
color13 #FF92DF
# Cyan
color6  #8BE9FD
color14 #A4FFFF
# White
color7  #F8F8F2
color15 #FFFFFF

# Cursor + URL
cursor    #BD93F9
url_color #8BE9FD
url_style curly
